<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive"><meta name="referrer" content="same-origin">
  <title>Orders | Pommy Admin</title>
  <link rel="icon" href="/assets/images/pommy-logo.png" type="image/png"><link rel="stylesheet" href="/assets/css/dm-sans.css"><link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
  <div class="admin-gate" data-admin-gate><img src="/assets/images/pommy-logo.png" alt="" width="64" height="64"><h1>Checking access</h1><p>Verifying your admin session...</p><button class="admin-button" type="button" hidden>Sign out</button></div>
  <div class="admin-shell" data-admin-app hidden>
    <aside class="admin-sidebar">
      <a class="admin-brand" href="/admin/"><img src="/assets/images/pommy-logo.png" alt="" width="48" height="48"><span>Pommy <small>Admin</small></span></a>
      <nav aria-label="Admin navigation"><a href="/admin/">Dashboard</a><a class="is-active" href="/admin/orders/" aria-current="page">Orders</a><a href="/admin/menu/">Menu</a></nav>
      <div class="admin-account"><span data-admin-email>Admin</span><button type="button" data-sign-out>Sign out</button></div>
    </aside>
    <main class="admin-main">
      <header class="admin-page-header"><div><p class="admin-eyebrow">Operations</p><h1>Orders</h1><p>Review order details and move each order through fulfilment.</p></div></header>
      <p class="admin-notice" data-notice role="status" hidden></p>
      <form class="admin-filters" data-order-filters>
        <label class="admin-search">Search<input type="search" name="search" placeholder="Order, customer, or phone"></label>
        <label>Status<select name="status"><option value="">All statuses</option><option value="new">New</option><option value="confirmed">Confirmed</option><option value="preparing">Preparing</option><option value="ready">Ready</option><option value="out_for_delivery">Out for delivery</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></label>
        <button class="admin-button admin-button-small" type="submit">Apply filters</button><button class="admin-text-button" type="reset">Clear</button>
      </form>
      <section class="order-list" data-order-list aria-live="polite"><p class="admin-loading">Loading orders...</p></section>
      <nav class="admin-pagination" aria-label="Order pages"><button type="button" data-prev>Previous</button><span data-page-summary>Page 1</span><button type="button" data-next>Next</button></nav>
    </main>
  </div>
  <script src="/assets/vendor/supabase-js-2.49.4.min.js"></script><script src="/assets/config/supabase-config.js"></script><script src="/assets/js/supabase-client.js"></script><script src="/assets/js/admin/common.js"></script><script src="/assets/js/admin/orders.js"></script>
</body>
</html>
